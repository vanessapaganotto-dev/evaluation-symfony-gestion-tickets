security:
    password_hashers:
        App\Entity\User: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    role_hierarchy:
        ROLE_ADMIN: ROLE_PERSONNEL
        ROLE_PERSONNEL: ROLE_USER

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
            logout:
                path: app_logout
                target: app_home

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/ticket/new, roles: PUBLIC_ACCESS }
        - { path: ^/tickets, roles: [ROLE_USER, ROLE_PERSONNEL, ROLE_ADMIN] }
        - { path: ^/ticket, roles: [ROLE_PERSONNEL, ROLE_ADMIN] }
        - { path: ^/admin, roles: ROLE_ADMIN }